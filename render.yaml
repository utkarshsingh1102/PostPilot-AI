# render.yaml – Render Blueprint (Infrastructure as Code)
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy steps:
#   1. Push this repo to GitHub.
#   2. In Render dashboard → New → Blueprint → select your repo.
#   3. Fill in the secret env vars marked sync: false (API keys, LinkedIn creds).
#   4. Click "Apply" – Render creates the DB and web service automatically.

services:
  - type: web
    name: postpilot-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # Playwright + Chromium requires ≥ 2 GB RAM.
    # "standard" ($25/mo) gives 2 GB. "starter" (512 MB) will OOM during scraping.
    plan: standard
    healthCheckPath: /api/v1/sources

    # Persistent disk – generated_images are stored here and survive redeploys.
    # Free plan does not support disks; upgrade to at least Starter for disk support.
    disk:
      name: postpilot-images
      mountPath: /app/generated_images
      sizeGB: 5

    envVars:
      # ---- Database (auto-populated from the DB defined below) ----
      - key: DATABASE_URL
        fromDatabase:
          name: postpilot-db
          property: connectionString

      # ---- Anthropic / Claude ----
      - key: ANTHROPIC_API_KEY
        sync: false   # set manually in the Render dashboard
      - key: CLAUDE_MODEL
        value: claude-opus-4-6

      # ---- Google Gemini (SDK present; image gen disabled in pipeline) ----
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-exp

      # ---- LinkedIn credentials (used by Playwright to log in) ----
      - key: LINKEDIN_EMAIL
        sync: false
      - key: LINKEDIN_PASSWORD
        sync: false

      # ---- Scheduler ----
      - key: SCRAPE_INTERVAL_HOURS
        value: "2"
      - key: SCRAPE_SINCE_DATE
        value: "2026-03-05"

      # ---- Storage (absolute path matching the disk mountPath above) ----
      - key: GENERATED_IMAGES_DIR
        value: /app/generated_images

      # ---- App ----
      - key: DEBUG
        value: "false"

databases:
  - name: postpilot-db
    databaseName: postpilot
    user: postpilot
    plan: free   # Render free PostgreSQL – 90-day trial, then $7/mo
